<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Visualizer Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>Sorting <span class="highlight-text">Visualizer</span></h1>
        <p>Helping everyone understand how computers organize data.</p>
    </div>

    <div class="main-container">
        <div class="view-panel">
            <h2 id="algo-title">Bubble Sort</h2>
            <div id="chart-container" class="bar-chart"></div>
            
            <div class="code-box">
                <p id="simple-explanation">Bubble Sort: Swapping neighbors if they are in the wrong order!</p>
                <div class="code-trace">
                    <div id="line-1">while(swapped) {</div>
                    <div id="line-2">&nbsp;&nbsp;if(left > right)</div>
                    <div id="line-3">&nbsp;&nbsp;&nbsp;&nbsp;swap(them)</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Choose Algorithm</label>
                <select id="algo-type" onchange="init()">
                    <option value="bubble">Bubble Sort (The Swapper)</option>
                    <option value="selection">Selection Sort (The Searcher)</option>
                    <option value="insertion">Insertion Sort (The Slider)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Type Numbers (e.g. 5, 2, 9)</label>
                <input type="text" id="custom-input" placeholder="Type here...">
                <button onclick="init(true)" class="btn-small">Use My Numbers</button>
            </div>

            <div class="control-group buttons">
                <button onclick="prev()">Back</button>
                <button onclick="next()" class="btn-primary">Next Step</button>
                <button onclick="init()" class="btn-outline">New Random</button>
            </div>

            <div class="control-group">
                <button id="audio-btn" onclick="toggleAudio()" class="btn-audio">🔈 Audio: OFF</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
